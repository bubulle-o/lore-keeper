name: mythopolis
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_speed_dial: ^7.0.0
  provider: ^6.1.5+1
  flutter_quill: ^11.5.1
  flutter_quill_extensions: ^11.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  sqflite_common_ffi: ^2.3.0
  shared_preferences: ^2.3.3
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  fonts:
    - family: Cardo
      fonts:
        - asset: assets/fonts/Cardo-Regular.ttf
        - asset: assets/fonts/Cardo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cardo-Italic.ttf
          style: italic

    - family: EBGaramond
      fonts:
        - asset: assets/fonts/EBGaramond-VariableFont_wght.ttf
        - asset: assets/fonts/EBGaramond-Italic-VariableFont_wght.ttf
          style: italic

    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-VariableFont_wght.ttf

    - family: MedievalSharp
      fonts:
        - asset: assets/fonts/MedievalSharp-Regular.ttf

    - family: UnifrakturMaguntia
      fonts:
        - asset: assets/fonts/UnifrakturMaguntia-Regular.ttf

    - family: PirataOne
      fonts:
        - asset: assets/fonts/PirataOne-Regular.ttf

    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-VariableFont_wght.ttf

    - family: Audiowide
      fonts:
        - asset: assets/fonts/Audiowide-Regular.ttf

    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend-VariableFont_wght.ttf
